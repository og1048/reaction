<!DOCTYPE html>
<html lang="en" style="background-color: #222;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Game Hub</title>
    <link rel="stylesheet" href="style.css?v=1.0">
    <script>
        // Define playlists globally
        const playlists = {
            '1': [
                "./answerQuestion/index.html?lineNumber=0",
                "./reactionTime/index.html?n=1",
                "./answerQuestion/index.html?lineNumber=1",
                "./stroopTest/index.html?choice=2&nrounds=1",
                "./answerQuestion/index.html?lineNumber=2",
                "./heartMatch/index.html?n=1",
            ],
            '2': [
                "./answerQuestion/index.html?lineNumber=0",
                "./reactionTime/index.html?n=5",
                "./answerQuestion/index.html?lineNumber=1",
                "./stroopTest/index.html?choice=4&nrounds=6",
                "./answerQuestion/index.html?lineNumber=2",
                "./heartMatch/index.html?n=6",
            ],
            '3': [
                "./answerQuestion/index.html?lineNumber=3",
                "./reactionTime/index.html?n=5",
                "./answerQuestion/index.html?lineNumber=4",
                "./stroopTest/index.html?choice=4&nrounds=6",
                "./answerQuestion/index.html?lineNumber=5",
                "./heartMatch/index.html?n=6",
                "./answerQuestion/index.html?lineNumber=6",              
            ],
            '4': [
                "./answerQuestion/index.html?lineNumber=7",
                "./reactionTime/index.html?n=5",
                "./answerQuestion/index.html?lineNumber=8",
		"./numberRecall2/index.html?n=6",
                "./answerQuestion/index.html?lineNumber=9",
                "./heartMatch/index.html?n=6",
            ],
            '5': [                
                "./answerQuestion/index.html?lineNumber=10",
		"./numberRecall2/index.html?n=6",
                "./answerQuestion/index.html?lineNumber=11",
                "./stroopTest/index.html?choice=4&nrounds=6",
                "./answerQuestion/index.html?lineNumber=12",
                "./heartMatch/index.html?n=6",
                "./answerQuestion/index.html?lineNumber=13",
            ]
        };

        // Early sequence check to redirect before body rendering/painting starts
        if (localStorage.getItem('playAllActive') === 'true') {
            const activeId = localStorage.getItem('activePlaylistId');
            const currentPlaylist = playlists[activeId];

            if (currentPlaylist) {
                let nextIndex = parseInt(localStorage.getItem('currentGameIndex') || '0') + 1;
                
                if (nextIndex < currentPlaylist.length) {
                    localStorage.setItem('currentGameIndex', nextIndex.toString());
                    window.location.href = currentPlaylist[nextIndex];
                } else {
                    localStorage.removeItem('playAllActive');
                    localStorage.removeItem('activePlaylistId');
                    localStorage.removeItem('currentGameIndex');
                    sessionStorage.setItem('showFinishedModal', 'true');
                }
            }
        }
    </script>
</head>
<body>

  <h1>Mini-Game Hub</h1>
  
    <div class="menu-container">
       <button id="play-btn-1" class="menu-btn" style="background-color: #2ed573;">Play all set 1</button>
       <button id="play-btn-2" class="menu-btn" style="background-color: #2ed573;">Emily first (7am-9am)</button>
       <button id="play-btn-3" class="menu-btn" style="background-color: #2ed573;">Emily second (10am-12pm)</button>
       <button id="play-btn-4" class="menu-btn" style="background-color: #2ed573;">Emily third (3pm-5pm)</button>
       <button id="play-btn-5" class="menu-btn" style="background-color: #2ed573;">Emily fourth (8pm-10pm)</button>
         <a href="./stroopTest/index.html?choice=2&nrounds=1" class="menu-btn">stroopTest</a>
        <a href="./moveTwice/index.html?n=1&m=1.5" class="menu-btn">moveTwice</a>
       <a href="./reactionTime/index.html?n=1" class="menu-btn">reactionTime</a>
        <a href="./heartMatch/index.html?n=1" class="menu-btn">heartMatch</a>
        <a href="./weightMonitor/index.html" class="menu-btn">weightMonitor</a>
        <a href="./answerQuestion/index.html?lineNumber=5" class="menu-btn">answerQuestion</a>
        <a href="./answerQuestion_dev/index.html?lineNumber=0" class="menu-btn">answerQuestion_dev</a>
        <a href="./numberRecall2/index.html?n=1" class="menu-btn">numberRecall2</a>

        </div>

    <!-- Custom Finish Modal overlay -->
    <div id="finish-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>Playlist Finished!</h2>
            <p>Thanks for playing.</p>
            <button id="modal-close-btn" class="modal-btn">Awesome</button>
        </div>
    </div>

    <script>
        // Attach Event Listeners to all 5 playlists play buttons dynamically
        for (let i = 1; i <= 5; i++) {
            const btn = document.getElementById(`play-btn-${i}`);
            if (btn) {
                btn.addEventListener('click', () => {
                    const currentPlaylist = playlists[i];
                    
                    if (currentPlaylist && currentPlaylist.length > 0) {
                        localStorage.setItem('playAllActive', 'true');
                        localStorage.setItem('activePlaylistId', i.toString());
                        localStorage.setItem('currentGameIndex', '0');        
                        window.location.href = currentPlaylist[0];
                    }
                });
            }
        }

        // Check if we should display the custom playlist finished modal
        if (sessionStorage.getItem('showFinishedModal') === 'true') {
            sessionStorage.removeItem('showFinishedModal');
            const modal = document.getElementById('finish-modal');
            if (modal) {
                modal.style.display = 'flex';
                const closeBtn = document.getElementById('modal-close-btn');
                if (closeBtn) {
                    closeBtn.addEventListener('click', () => {
                        modal.style.display = 'none';
                    });
                }
            }
        }
    </script>
</body>
</html>
