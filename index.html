<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Game Hub</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
        }

        /* Link styled to look like a button */
        .menu-btn {
            display: block;
            text-align: center;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #1e90ff;
            text-decoration: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.2s, transform 0.1s;
        }

        .menu-btn:hover {
            background-color: #3742fa;
            transform: translateY(-2px);
        }

        .menu-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <h1>Mini-Game Hub</h1>

    <div class="menu-container">
        <a href="./weightMonitor/index.html" class="menu-btn">WeightMonitor</a>
        <a href="./threeQuestions/index.html" class="menu-btn">threeQuestions</a>
        <a href="./numberRecall2/index.html" class="menu-btn">numberRecall2</a>
        <button id="play-all-btn" class="menu-btn" style="background-color: #2ed573;">Play All Games</button>
        </div>

    <script>
    // 1. Define your list of games
    const gamesPlaylist = [
        "./slider/index.html",
        "./threeQuestions/index.html",
        "./numberRecall2/index.html"
    ];

    // 2. "Play All" Button Click Handler
    document.getElementById('play-all-btn').addEventListener('click', () => {
        localStorage.setItem('playAllActive', 'true');
        localStorage.setItem('currentGameIndex', '0');
        
        // Launch first game immediately
        window.location.href = gamesPlaylist[0];
    });

    // 3. Hub Sequence Checker (runs automatically when returning to this page)
    window.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('playAllActive') === 'true') {
            // Get the index of the game we *just* finished, and increment it
            let nextIndex = parseInt(localStorage.getItem('currentGameIndex') || '0') + 1;

            if (nextIndex < gamesPlaylist.length) {
                // Save progress and launch next game
                localStorage.setItem('currentGameIndex', nextIndex.toString());
                window.location.href = gamesPlaylist[nextIndex];
            } else {
                // Playlist finished! Clean up localStorage
                localStorage.removeItem('playAllActive');
                localStorage.removeItem('currentGameIndex');
                alert('Playlist finished! Thanks for playing.');
            }
        }
    });
</script>
</body>
</html>
