<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Game Hub</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
        }

        /* Link styled to look like a button */
        .menu-btn {
            display: block;
            text-align: center;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #1e90ff;
            text-decoration: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.2s, transform 0.1s;
        }

        .menu-btn:hover {
            background-color: #3742fa;
            transform: translateY(-2px);
        }

        .menu-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <h1>Mini-Game Hub</h1>

    <div class="menu-container">
        <a href="./slider/index.html" class="menu-btn">Slider Chooser</a>
        <a href="./numberRecall/index.html" class="menu-btn">numberRecall</a>
        <a href="./threeQuestions/index.html" class="menu-btn">threeQuestions</a>
        
        </div>

</body>
</html>
