<!DOCTYPE html>
<html lang="en" style="background-color: #222;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Answer Question</title>

    <link rel="stylesheet" href="style.css?v=1.0">

</head>

<body>
    <a href="../index.html" class="back-btn">← Back</a>

    <div class="container" id="game-box">
        <div id="loading">Loading question...</div>
    </div>



    <script>
        //##############################################################
        // Configuration
        const apiURL = 'https://sheetdb.io/api/v1/d5s94bladh590';
        const jsonPath = '../game-data.json'; // Path to master JSON relative to this file

        // Get or create unique user ID
        function getUserId() {
            let userId = localStorage.getItem('user_id');
            if (!userId) {
                userId = typeof crypto.randomUUID === 'function' 
                    ? crypto.randomUUID() 
                    : 'user_' + Math.random().toString(36).substring(2, 15);
                localStorage.setItem('user_id', userId);
            }
            return userId;
        }

        // Elements & State
        const container = document.getElementById('game-box');
        let questionIndex = 0;
        let questionData = null;

        // 1. Parse URL Parameter (?lineNumber=X)
        const urlParams = new URLSearchParams(window.location.search);
        const lineParam = urlParams.get('lineNumber');

        if (lineParam !== null) {
            questionIndex = parseInt(lineParam, 10);
        }
        //################################################################
        // 2. Fetch the question data from parent directory
        fetch(jsonPath)
            .then(response => {
                if (!response.ok) throw new Error('Failed to load game-data.json');
                return response.json();
            })
            .then(data => {
                if (data.answerQuestions && data.answerQuestions[questionIndex]) {
                    questionData = data.answerQuestions[questionIndex];
                    renderGame();
                } else {
                    renderError("Question not found for index: " + questionIndex);
                }
            })
            .catch(err => {
                console.error(err);
                renderError("Error loading game data.");
            });
        //################################################################  
        // 3. Render game HTML dynamically based on JSON config
        function renderGame() {
            container.innerHTML = `
            <h2 id="question-text">${questionData.text}</h2>
            <span class="sub-text" id="sub-text">${questionData.sub || ''}</span>
            
            <div class="slider-container">
                <input type="range" id="rating-slider" class="slider hidden-thumb" 
                       min="${questionData.min || 1}" 
                       max="${questionData.max || 5}" 
                       step="${questionData.step || 1}" 
                       value="${questionData.startingValue || 3}">
                <div class="current-value hidden-val" id="slider-val">${questionData.startingValue || 3}</div>

            </div>

            <button class="btn" id="submit-btn">Submit Answer</button>
        `;

            const slider = document.getElementById('rating-slider');
            const display = document.getElementById('slider-val');
            const submitBtn = document.getElementById('submit-btn');

            // Dynamic slider value rendering
            slider.addEventListener('input', (e) => {
                display.textContent = e.target.value;
            });

            // Form Submission
            submitBtn.addEventListener('click', () => {
                submitAnswer(slider.value, submitBtn);
            });

            // Reveal slider thumb and value display on first screen touch/interaction
            function revealControls() {
                slider.classList.remove('hidden-thumb');
                display.classList.remove('hidden-val');
                window.removeEventListener('mousedown', revealControls);
                window.removeEventListener('touchstart', revealControls);
            }
            window.addEventListener('mousedown', revealControls);
            window.addEventListener('touchstart', revealControls);
        }
        //################################################################  
        // 4. Send Data to SheetDB & Redirect back to Hub
        function submitAnswer(value, button) {
            button.disabled = true;
            button.textContent = "Sending...";

            const timestamp = new Date().toISOString();
            const gameName = "AnswerQuestion";

            // Output format: "qnNumber~answer" (e.g., "0~3.4")
            const roundData = `${questionIndex}~${value}`;

            const payload = {
                data: [
                    {
                        "userId": getUserId(),
                        "timestamp": timestamp,
                        "game": gameName,
                        "round": roundData
                    }
                ]
            };

            fetch(apiURL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
                .then(response => {
                    if (!response.ok) throw new Error('Spreadsheet write failed');
                    return response.json();
                })
                .then(result => {
                    // Success - Route back to the master hub parent directory
                    window.location.href = '../index.html';
                })
                .catch(err => {
                    alert("Error saving data. Please try again.");
                    button.disabled = false;
                    button.textContent = "Submit Answer";
                    console.error(err);
                });
        }
        //################################################################  
        function renderError(message) {
            container.innerHTML = `
            <div class="error-msg">${message}</div>
            <button class="btn" onclick="window.location.href='../index.html'">Back to Hub</button>
        `;
        }
        //################################################################  
    </script>
</body>

</html>
