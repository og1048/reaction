<!DOCTYPE html>
<html lang="en" style="background-color: #222;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroop Test</title>
    <style>
        :root {
            --bg-color: #222;
            --container-bg: #333;
            --text-color: #fff;
            --accent-color: #4caf50;
            --btn-bg: #444;
            --btn-hover: #555;
            
            /* Stroop Colors */
            --stroop-red: #ff4d4d;
            --stroop-blue: #4da6ff;
            --stroop-green: #4dff4d;
            --stroop-yellow: #ffff4d;
            --stroop-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
        }

        .game-container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            letter-spacing: 1px;
            border-bottom: 2px solid #444;
            padding-bottom: 10px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 25px;
        }

        .test-box {
            background: #1a1a1a;
            padding: 30px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        #root-word {
            font-size: 3.5rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        #rule-word {
            font-size: 1.5rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .game-btn {
            background-color: var(--btn-bg);
            color: var(--text-color);
            border: 2px solid #555;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-transform: capitalize;
            transition: background 0.2s, transform 0.1s;
        }

        .game-btn:hover {
            background-color: var(--btn-hover);
        }

        .game-btn:active {
            transform: scale(0.97);
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .result-text {
            font-size: 1.3rem;
            margin: 20px 0;
            line-height: 1.6;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="game-screen" class="screen active">
            <h1>Stroop Test</h1>
            <div class="stats-bar">
                <span id="round-indicator">Round: 1/3</span>
                <span id="score-indicator">Correct: 0</span>
            </div>
            
            <div class="test-box">
                <div id="root-word">---</div>
                <div id="rule-word">---</div>
            </div>

            <div id="button-area" class="button-grid">
                </div>
        </div>

        <div id="end-screen" class="screen">
            <h1>Test Complete!</h1>
            <div class="result-text" id="feedback-msg">
                Processing your results...
            </div>
            <div id="loader" class="loader"></div>
            <button id="continue-btn" class="game-btn" style="width: 100%; display: none; background-color: var(--accent-color); border: none;">
                Continue to Hub
            </button>
        </div>
    </div>

    <script>
        // --- Game Setup Configuration ---
        const urlParams = new URLSearchParams(window.location.search);
        
        // Choice: 2 (red/green), 3 (red/green/blue), 4 (red/green/blue/yellow)
        const choice = parseInt(urlParams.get('choice')) || 3; 
        const nrounds = parseInt(urlParams.get('nrounds')) || 3;
        
        const API_URL = 'https://sheetdb.io/api/v1/d5s94bladh590';
        const HUB_URL = '../index.html'; // Adjust if your parent main hub page is named differently

        // Get or create unique user ID
        function getUserId() {
            let userId = localStorage.getItem('user_id');
            if (!userId) {
                userId = typeof crypto.randomUUID === 'function' 
                    ? crypto.randomUUID() 
                    : 'user_' + Math.random().toString(36).substring(2, 15);
                localStorage.setItem('user_id', userId);
            }
            return userId;
        }

        // Palette mapping
        const colorPool = ['red', 'green', 'blue', 'yellow'];
        const ruleColorPool = ['red', 'green', 'blue', 'yellow', 'white'];
        
        // Trim pools to match the requested game difficulty layout
        const activeColors = colorPool.slice(0, choice);
        const activeRuleColors = ruleColorPool.filter(c => c === 'white' || activeColors.includes(c));

        const colorMap = {
            'red': 'var(--stroop-red)',
            'green': 'var(--stroop-green)',
            'blue': 'var(--stroop-blue)',
            'yellow': 'var(--stroop-yellow)',
            'white': 'var(--stroop-white)'
        };

        // --- Game State Variables ---
        let currentRound = 1;
        let correctAnswersCount = 0;
        let fastestCorrectTime = Infinity;
        let roundStartTime = 0;
        let currentTargetAnswer = '';
        
        // Round logging components
        let currentRootWord = '';
        let currentRootColor = '';
        let currentRuleWord = '';
        let currentRuleColor = '';
        
        // Array to store individual round strings
        const roundDataStrings = [];

        // DOM Elements
        const rootWordEl = document.getElementById('root-word');
        const ruleWordEl = document.getElementById('rule-word');
        const buttonArea = document.getElementById('button-area');
        const roundIndicator = document.getElementById('round-indicator');
        const scoreIndicator = document.getElementById('score-indicator');
        const gameScreen = document.getElementById('game-screen');
        const endScreen = document.getElementById('end-screen');
        const feedbackMsg = document.getElementById('feedback-msg');
        const loader = document.getElementById('loader');
        const continueBtn = document.getElementById('continue-btn');

        // Initialize UI Control Buttons based on 'choice'
        function initButtons() {
            buttonArea.innerHTML = '';
            activeColors.forEach(color => {
                const btn = document.createElement('button');
                btn.className = 'game-btn';
                btn.textContent = color;
                btn.addEventListener('click', () => handleUserSelection(color));
                buttonArea.appendChild(btn);
            });
        }

        // Start a fresh round
        function nextRound() {
            if (currentRound > nrounds) {
                endGame();
                return;
            }

            roundIndicator.textContent = `Round: ${currentRound}/${nrounds}`;
            scoreIndicator.textContent = `Correct: ${correctAnswersCount}`;

            // 1. Pick Random parameters
            currentRootWord = activeColors[Math.floor(Math.random() * activeColors.length)];
            currentRootColor = activeColors[Math.floor(Math.random() * activeColors.length)];
            
            currentRuleWord = Math.random() < 0.5 ? 'word' : 'colour';
            currentRuleColor = activeRuleColors[Math.floor(Math.random() * activeRuleColors.length)];

            // 2. Determine target answer
            currentTargetAnswer = (currentRuleWord === 'word') ? currentRootWord : currentRootColor;

            // 3. Render setup on DOM
            rootWordEl.textContent = currentRootWord;
            rootWordEl.style.color = colorMap[currentRootColor];

            ruleWordEl.textContent = currentRuleWord;
            ruleWordEl.style.color = colorMap[currentRuleColor];

            // 4. Start Reaction Timer
            roundStartTime = performance.now();
        }


// Process button interaction
        function handleUserSelection(selectedColor) {
            const reactionTimeMs = Math.round(performance.now() - roundStartTime);
            const isCorrect = (selectedColor === currentTargetAnswer);

            if (isCorrect) {
                correctAnswersCount++;
                if (reactionTimeMs < fastestCorrectTime) {
                    fastestCorrectTime = reactionTimeMs;
                }
            }

            // Helper to grab just the first lowercase letter of any word/colour
            const getInitial = (str) => str.charAt(0).toLowerCase();

            // Construct compressed '~' separated record string for this round
            // Example format: r~r~w~w~2~450~r
            const roundRecord = [
                getInitial(currentRootWord),
                getInitial(currentRootColor),
                getInitial(currentRuleWord),  // 'w' for word, 'c' for colour
                getInitial(currentRuleColor),
                choice,
                reactionTimeMs,
                getInitial(selectedColor)
            ].join('~');

            roundDataStrings.push(roundRecord);

            // Step forward
            currentRound++;
            nextRound();
        }
      

        // Complete execution and upload aggregate data
        function endGame() {
            gameScreen.classList.remove('active');
            endScreen.classList.add('active');
            loader.style.display = 'block';

            const bestTimeText = fastestCorrectTime === Infinity ? "N/A" : `${(fastestCorrectTime / 1000).toFixed(3)}s`;
            feedbackMsg.innerHTML = `Collating game results...<br>Your best correct time: <strong>${bestTimeText}</strong>`;

            // Prepare payload
            const timestamp = new Date().toISOString();
            const finalResultString = roundDataStrings.join('~');

            const payload = {
                data: [
                    {
                        "userId": getUserId(),
                        "timestamp": timestamp,
                        "game": "stroopTest",
                        "round": finalResultString
                    }
                ]
            };

            // Post to SheetDB
            fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                loader.style.display = 'none';
                feedbackMsg.innerHTML = `Data saved securely!<br><br>Your fastest correct reaction time was: <strong>${bestTimeText}</strong>.<br>Accuracy: ${correctAnswersCount}/${nrounds}`;
                continueBtn.style.display = 'block';
            })
            .catch(error => {
                console.error('Error writing to spreadsheet:', error);
                loader.style.display = 'none';
                feedbackMsg.innerHTML = `Data save failed, but your game is done!<br>Best valid time: <strong>${bestTimeText}</strong>`;
                continueBtn.style.display = 'block';
            });
        }

        // Wire continuation button logic back to hub
        continueBtn.addEventListener('click', () => {
            window.location.href = HUB_URL;
        });

        // Initialize execution setup
        initButtons();
        nextRound();
    </script>
</body>
</html>
